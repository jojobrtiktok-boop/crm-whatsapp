services:
  app-crm:
    build: .
    container_name: crm_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis_crm
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis_crm:6379
      - BULL_REDIS_HOST=redis_crm
      - BULL_REDIS_PORT=6379
      - NODE_ENV=production
      - DATABASE_URL=postgresql://crm_user:crm_pass@db_crm:5432/crm_db?schema=public
      - REDIS_URL=redis://redis_crm:6379
    depends_on:
      - db-crm
      - redis-crm

  db-crm:
    image: postgres:15
    container_name: db_crm
    restart: always
    environment:
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_pass
      - POSTGRES_DB=crm_db
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data

  redis-crm:
    image: redis:7-alpine
    container_name: redis_crm
    restart: always

volumes:
  crm_postgres_data:
